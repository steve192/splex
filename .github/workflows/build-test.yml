name: Build & Test

# Reusable validation suite: frontend checks, backend tests, and a no-push
# Docker build. Called by ci.yml (for pushes / PRs) and by expo-sdk-update.yml
# (against its update branch) so the validation logic lives in one place.

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out and validate. Empty = the triggering ref."
        type: string
        required: false
        default: ""

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Expo dependency check
        run: npx expo-doctor

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build web
        run: npm run build:web

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.5"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  docker:
    name: Build Docker
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: splex-ci:${{ github.sha }}
