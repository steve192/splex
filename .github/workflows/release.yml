name: Release

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      GH_TOKEN:
        required: true
      EXPO_TOKEN:
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  semantic-preview:
    name: Semantic release preview
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run semantic-release dry run
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: true
          semantic_version: 23
          branches: main
          extra_plugins: |
            @semantic-release/exec@6
            @semantic-release/git@10
            conventional-changelog-conventionalcommits@7
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  release:
    name: Publish release
    needs: semantic-preview
    if: needs.semantic-preview.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run semantic-release
        id: semrel
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 23
          branches: main
          extra_plugins: |
            @semantic-release/exec@6
            @semantic-release/git@10
            conventional-changelog-conventionalcommits@7
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Log into ghcr.io
        if: steps.semrel.outputs.new_release_published == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Android APK
        if: steps.semrel.outputs.new_release_published == 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          RELEASE_VERSION: ${{ steps.semrel.outputs.new_release_version }}
        run: |
          docker run \
            -e EXPO_TOKEN="$EXPO_TOKEN" \
            -v "$(pwd)":/builder \
            ghcr.io/steve192/splex-easbuilder:latest \
            production-apk "splex-${RELEASE_VERSION}.apk"

      - name: Attach APK to GitHub release
        if: steps.semrel.outputs.new_release_published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semrel.outputs.new_release_git_tag }}
          files: frontend/splex-${{ steps.semrel.outputs.new_release_version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
