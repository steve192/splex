name: Release

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      EXPO_TOKEN:
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  semantic-preview:
    name: Semantic release preview
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.5"

      - name: Run semantic-release dry run
        id: semantic
        uses: cycjimmy/semantic-release-action@v6.0.0
        with:
          dry_run: true
          semantic_version: 23
          branches: main
          extra_plugins: |
            @semantic-release/exec@6
            @semantic-release/git@10
            conventional-changelog-conventionalcommits@7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tag:
    name: Create tag and GitHub release
    needs: semantic-preview
    if: needs.semantic-preview.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.5"

      - name: Run semantic-release
        uses: cycjimmy/semantic-release-action@v6.0.0
        with:
          semantic_version: 23
          branches: main
          extra_plugins: |
            @semantic-release/exec@6
            @semantic-release/git@10
            conventional-changelog-conventionalcommits@7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker:
    name: Publish Docker
    needs: [semantic-preview, tag]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.semantic-preview.outputs.tag }}

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.semantic-preview.outputs.tag }}
            ghcr.io/${{ github.repository }}:${{ needs.semantic-preview.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

  publish-expo-update:
    name: Publish Expo Update
    needs: [semantic-preview, tag]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.semantic-preview.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Publish Expo update
        if: ${{ env.EXPO_TOKEN != '' }}
        run: npx eas update --branch production --auto

  apk:
    name: Build Android APK
    needs: [semantic-preview, publish-docker, publish-expo-update]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.semantic-preview.outputs.tag }}

      - name: Log into ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Android APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          RELEASE_VERSION: ${{ needs.semantic-preview.outputs.version }}
        run: |
          docker run \
            -e EXPO_TOKEN="$EXPO_TOKEN" \
            -v "$(pwd)":/builder \
            ghcr.io/steve192/splex-easbuilder:latest \
            production-apk "splex-${RELEASE_VERSION}.apk"

      - name: Attach APK to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.semantic-preview.outputs.tag }}
          files: frontend/splex-${{ needs.semantic-preview.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
