name: Build support images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile.builder
      - scripts/build-android.sh
      - .dockerignore
      # The builder image pre-warms Gradle/npm caches from the current frontend
      # source, so it must rebuild whenever native deps or native config change.
      - frontend/package.json
      - frontend/package-lock.json
      - frontend/app.json
      - frontend/plugins/**

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: steve192/splex-easbuilder

jobs:
  build-support-images:
    name: Build and push EAS builder image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # ubuntu-latest only ships with ~14 GB free disk. The Android prewarm
      # blows past that, so reclaim ~30 GB by removing preinstalled tooling
      # we don't need for this build.
      - name: Free runner disk
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.builder
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=builder
          cache-to: type=gha,scope=builder,mode=max
