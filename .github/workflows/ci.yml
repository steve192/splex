name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, synchronize, reopened]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Expo dependency check
        run: npx expo-doctor

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build web
        run: npm run build:web

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.5"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  docker:
    name: Build Docker
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: splex-ci:${{ github.sha }}

  renovate-release-check:
    name: Evaluate Renovate-only commits
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      should_release: ${{ steps.evaluate.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine eligibility
        id: evaluate
        run: |
          last_tag=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo '')
          if [ -z "$last_tag" ]; then
            echo "No previous release tag found. Skipping automatic release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git merge-base --is-ancestor "$last_tag" HEAD; then
            :
          else
            echo "Last tag $last_tag not an ancestor of HEAD; skipping automatic release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          commit_range="${last_tag}..HEAD"
          commit_list=$(git rev-list "$commit_range")
          if [ -z "$commit_list" ]; then
            echo "No commits since $last_tag. Skipping automatic release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          commit_info=$(git log "$commit_range" --pretty='%an|%ae')
          should_release=true
          while IFS='|' read -r author email; do
            [ -z "$author" ] && continue
            lower=$(printf '%s %s' "$author" "$email" | tr '[:upper:]' '[:lower:]')
            if [[ "$lower" != *renovate* ]]; then
              echo "Found non-Renovate commit from $author <$email>. Release will be skipped."
              should_release=false
              break
            fi
          done <<< "$commit_info"

          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

  auto-release:
    name: Auto release
    needs: renovate-release-check
    if: needs.renovate-release-check.outputs.should_release == 'true'
    uses: ./.github/workflows/release.yml
    with:
      # The calling workflow IS the CI run that release.yml would otherwise
      # have to verify, so wait-on-yourself is impossible.  See the
      # verify-default-branch-ci job in release.yml for details.
      skip_default_branch_ci_check: true
    permissions:
      # ``actions: read`` is not needed today because verify-default-branch-ci
      # bypasses its API calls when ``skip_default_branch_ci_check`` is set,
      # but the called workflow declares it at the top level.  Granting it
      # here keeps the permission ceiling consistent so removing the skip
      # later doesn't trigger a confusing 403 from the GitHub API.
      actions: read
      contents: write
      issues: write
      pull-requests: write
      packages: write
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
