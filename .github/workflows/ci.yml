name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
  pull_request:
    types: [opened, synchronize, reopened]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build web
        run: npm run build:web

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.5"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  docker:
    name: Build Docker
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: splex-ci:${{ github.sha }}

  publish-docker:
    name: Publish Docker
    needs: [frontend, backend]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-expo-update:
    name: Publish Expo Update
    needs: [frontend, backend]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Publish Expo update
        if: ${{ env.EXPO_TOKEN != '' }}
        run: npx eas update --branch production --auto

  renovate-release-check:
    name: Evaluate Renovate-only commits
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      should_release: ${{ steps.evaluate.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine eligibility
        id: evaluate
        run: |
          last_tag=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo '')
          if [ -z "$last_tag" ]; then
            echo "No previous release tag found. Skipping automatic release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git merge-base --is-ancestor "$last_tag" HEAD; then
            :
          else
            echo "Last tag $last_tag not an ancestor of HEAD; skipping automatic release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          commit_range="${last_tag}..HEAD"
          commit_list=$(git rev-list "$commit_range")
          if [ -z "$commit_list" ]; then
            echo "No commits since $last_tag. Skipping automatic release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          commit_info=$(git log "$commit_range" --pretty='%an|%ae')
          should_release=true
          while IFS='|' read -r author email; do
            [ -z "$author" ] && continue
            lower=$(printf '%s %s' "$author" "$email" | tr '[:upper:]' '[:lower:]')
            if [[ "$lower" != *renovate* ]]; then
              echo "Found non-Renovate commit from $author <$email>. Release will be skipped."
              should_release=false
              break
            fi
          done <<< "$commit_info"

          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

  auto-release:
    name: Auto release
    needs: renovate-release-check
    if: needs.renovate-release-check.outputs.should_release == 'true'
    uses: ./.github/workflows/release.yml
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
