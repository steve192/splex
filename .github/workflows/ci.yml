name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, synchronize, reopened]
  # Lets the expo-sdk-update workflow kick off a main CI run after it merges,
  # so the release-eligibility check + auto-release run even though a
  # GITHUB_TOKEN merge does not emit a push event.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Cancel superseded runs per ref, except on main where a cancelled run could
# abort an in-flight auto-release.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: read

jobs:
  build-test:
    name: Build & Test
    uses: ./.github/workflows/build-test.yml

  sonar:
    name: SonarCloud
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup frontend
        uses: ./.github/actions/setup-frontend

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Setup backend
        uses: ./.github/actions/setup-backend

      - name: Run backend tests with coverage
        working-directory: backend
        run: python -m pytest --junitxml=test-results/junit.xml --cov=splex --cov-report=xml:coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  renovate-release-check:
    name: Evaluate Renovate-only commits
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      should_release: ${{ steps.evaluate.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine eligibility
        id: evaluate
        run: |
          last_tag=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo '')
          if [ -z "$last_tag" ]; then
            echo "No previous release tag found. Skipping automatic release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git merge-base --is-ancestor "$last_tag" HEAD; then
            :
          else
            echo "Last tag $last_tag not an ancestor of HEAD; skipping automatic release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          commit_range="${last_tag}..HEAD"
          commit_list=$(git rev-list "$commit_range")
          if [ -z "$commit_list" ]; then
            echo "No commits since $last_tag. Skipping automatic release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          commit_info=$(git log "$commit_range" --pretty='%an|%ae|%s')
          should_release=true
          while IFS='|' read -r author email subject; do
            [ -z "$author" ] && continue
            lower=$(printf '%s %s' "$author" "$email" | tr '[:upper:]' '[:lower:]')
            if [[ "$lower" == *renovate* ]]; then
              continue
            fi
            # Squash merges from the expo-sdk-update workflow carry the PR
            # author, not a bot identity, so match them by commit subject.
            if [[ "$subject" == "fix(deps): update expo sdk packages"* ]]; then
              continue
            fi
            echo "Found non-dependency-bot commit from $author <$email>. Release will be skipped."
            should_release=false
            break
          done <<< "$commit_info"

          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

  auto-release:
    name: Auto release
    needs: renovate-release-check
    if: needs.renovate-release-check.outputs.should_release == 'true'
    uses: ./.github/workflows/release.yml
    with:
      # The calling workflow IS the CI run that release.yml would otherwise
      # have to verify, so wait-on-yourself is impossible.  See the
      # verify-default-branch-ci job in release.yml for details.
      skip_default_branch_ci_check: true
    permissions:
      # ``actions: read`` is not needed today because verify-default-branch-ci
      # bypasses its API calls when ``skip_default_branch_ci_check`` is set,
      # but the called workflow declares it at the top level.  Granting it
      # here keeps the permission ceiling consistent so removing the skip
      # later doesn't trigger a confusing 403 from the GitHub API.
      actions: read
      contents: write
      issues: write
      pull-requests: write
      packages: write
    secrets:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
