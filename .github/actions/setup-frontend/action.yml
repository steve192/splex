name: Setup frontend
description: >-
  Set up Node from frontend/.nvmrc with an npm cache and (by default) install
  frontend dependencies. The repository must already be checked out.

inputs:
  install:
    description: Whether to run `npm ci` after setting up Node.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version-file: frontend/.nvmrc
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      if: inputs.install == 'true'
      shell: bash
      working-directory: frontend
      run: npm ci
