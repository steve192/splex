{% extends "emails/base.html" %}
{% block title %}{{ subject }}{% endblock %}
{% block preheader %}{{ preheader }}{% endblock %}

{% block content %}
<h1 style="margin:0 0 16px 0; font-size:22px; line-height:28px; color:#111827; font-weight:600;">
  {{ heading }}
</h1>

<p style="margin:0 0 16px 0; font-size:15px; line-height:22px; color:#374151;">
  {{ body }}
</p>

<p style="margin:0 0 16px 0; font-size:15px; line-height:22px; color:#374151;">
  {{ history }}
</p>

<p style="margin:0 0 24px 0; font-size:15px; line-height:22px; color:#374151;">
  {{ recreate }}
</p>

<p style="margin:0; font-size:13px; line-height:20px; color:#6b7280;">
  {{ unexpected }}
</p>
{% endblock %}
