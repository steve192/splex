{% extends "emails/base.html" %}
{% block title %}{{ subject }}{% endblock %}
{% block preheader %}{{ preheader }}{% endblock %}

{% block content %}
<h1 style="margin:0 0 16px 0; font-size:22px; line-height:28px; color:#111827; font-weight:600;">
  {{ heading }}
</h1>
<p style="margin:0 0 24px 0; font-size:15px; line-height:22px; color:#374151;">
  {{ instructions }}
</p>

<!-- CTA button -->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 28px 0;">
  <tr>
    <td bgcolor="#006A60" style="border-radius:8px;">
      <a href="{{ magic_url }}"
         style="display:inline-block; padding:14px 28px; font-size:15px; font-weight:600; color:#ffffff; text-decoration:none; border-radius:8px;">
        {{ button_label }}
      </a>
    </td>
  </tr>
</table>

<!-- Code box -->
<p style="margin:0 0 8px 0; font-size:13px; line-height:18px; color:#6b7280; text-transform:uppercase; letter-spacing:0.5px;">
  {{ code_label }}
</p>
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 24px 0;">
  <tr>
    <td style="background-color:#f3f4f6; border:1px solid #e5e7eb; border-radius:8px; padding:14px 22px;">
      <span style="font-family: 'SFMono-Regular', Menlo, Consolas, monospace; font-size:26px; font-weight:700; color:#111827; letter-spacing:6px;">
        {{ code }}
      </span>
    </td>
  </tr>
</table>

<p style="margin:0 0 8px 0; font-size:13px; line-height:20px; color:#6b7280;">
  {{ expiry }}
</p>
<p style="margin:0; font-size:13px; line-height:20px; color:#6b7280; word-break:break-all;">
  <a href="{{ magic_url }}" style="color:#006A60; text-decoration:underline;">{{ magic_url }}</a>
</p>
{% endblock %}
