[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "splex-backend"
version = "1.0.0"
description = "Self-hosted expense splitter backend"
requires-python = ">=3.8"
dependencies = [
  "Django>=4.2.30,<4.3",
  "djangorestframework>=3.14,<3.16",
  "djangorestframework-simplejwt>=5.3,<6",
  "django-cors-headers>=4.3,<5",
  "dj-database-url>=2.1,<3",
  "python-dotenv>=1,<2",
  "requests>=2.31,<3",
  "gunicorn>=22,<24",
  "pywebpush>=2.3.0,<3",
  "Pillow>=10,<12",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4,<9",
  "pytest-django>=4.7,<5",
  "ruff>=0.5,<1",
]
[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
pythonpath = ["src"]
testpaths = ["tests", "src"]

[tool.ruff]
line-length = 100
target-version = "py38"
extend-exclude = ["*/migrations/*"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B904"]
