# SonarCloud project configuration
# Verify projectKey and organization match what SonarCloud shows for your project
sonar.projectKey=steve192_splex
sonar.organization=steve192
sonar.projectName=splex

sonar.sources=frontend/src,backend/src
sonar.tests=backend/tests
sonar.test.inclusions=frontend/src/**/*.test.ts

sonar.exclusions=\
  **/node_modules/**,\
  **/migrations/**,\
  **/dist/**,\
  **/__pycache__/**

sonar.coverage.exclusions=\
  frontend/src/**/*.test.ts,\
  backend/tests/**

# Python coverage (Cobertura XML produced by pytest-cov)
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.python.xunit.reportPath=backend/test-results/junit.xml

# JavaScript / TypeScript coverage (LCOV produced by @vitest/coverage-v8)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
