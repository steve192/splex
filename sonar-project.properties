# SonarCloud project configuration
# Verify projectKey and organization match what SonarCloud shows for your project
sonar.projectKey=steve192_splex
sonar.organization=steve192
sonar.projectName=splex

sonar.sources=frontend/src,backend/src
sonar.tests=backend/tests
sonar.test.inclusions=frontend/src/**/*.test.ts

sonar.exclusions=\
  **/node_modules/**,\
  **/migrations/**,\
  **/dist/**,\
  **/__pycache__/**

# Coverage is measured on logic modules only. The following have no unit-test
# harness or contain no testable logic, so they are excluded from the coverage
# denominator (they are still analysed for code smells via sonar.sources):
#   - *.tsx  : React components (no component-test runner configured)
#   - styles/theme/colors/assets : declarative StyleSheet/theme/require data
#   - *.generated.* : build-time generated files
sonar.coverage.exclusions=\
  frontend/src/**/*.test.ts,\
  frontend/src/**/*.tsx,\
  frontend/src/**/*.generated.ts,\
  frontend/src/**/*.generated.json,\
  frontend/src/shared/ui/styles.ts,\
  frontend/src/shared/ui/colors.ts,\
  frontend/src/application/theme.ts,\
  frontend/src/shared/assets/images.ts,\
  backend/tests/**

# Python coverage (Cobertura XML produced by pytest-cov)
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.python.xunit.reportPath=backend/test-results/junit.xml

# JavaScript / TypeScript coverage (LCOV produced by @vitest/coverage-v8)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
